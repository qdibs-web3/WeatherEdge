name: Deploy WeatherEdge to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          cd ~/WeatherEdge

          # Pull latest code
          git pull origin main

          # Install dependencies
          npm install --legacy-peer-deps

          # Build the app
          npm run build

          # Copy build output to nginx directory
          sudo rm -rf /var/www/predictiveapex.club/*
          sudo cp -r dist/* /var/www/predictiveapex.club/
          sudo chown -R www-data:www-data /var/www/predictiveapex.club

          # Reload nginx
          sudo nginx -t && sudo systemctl reload nginx

          # Restart PM2 if you have a backend process
          # pm2 restart weatheredge-api || true
          # pm2 save